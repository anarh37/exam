<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정답지 제출 </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // 제공해주신 구글 앱스 스크립트 URL을 적용했습니다.
        const scriptURL = "https://script.google.com/macros/s/AKfycbwnDVu3mNpcJHXGVUWATPtkPKLOJgNEt3IfWgYvGCVaNQKgeLFx-wG5_pLXleDlVYiBcg/exec";

        const totalQuestions = 24;
        const answers = {};

        // UI 제어 함수
        window.startSurvey = () => {
            const subject = document.getElementById('subject').value;
            const gradeClass = document.getElementById('gradeClass').value;
            const studentNum = document.getElementById('studentNum').value;
            const studentName = document.getElementById('studentName').value;

            if (!subject || !gradeClass || !studentNum || !studentName) {
                showMessage("모든 정보를 입력해 주세요.");
                return;
            }

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('survey-screen').classList.remove('hidden');
            renderQuestions();
            window.scrollTo(0, 0);
        };

        function renderQuestions() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';

            for (let i = 1; i <= totalQuestions; i++) {
                const questionDiv = document.createElement('div');
                questionDiv.className = "bg-white p-4 rounded-lg shadow-sm border border-gray-100 mb-4";
                
                let optionsHtml = '';
                for (let opt = 1; opt <= 4; opt++) {
                    optionsHtml += `
                        <label class="flex items-center justify-center p-3 border rounded-md cursor-pointer hover:bg-blue-50 transition-colors">
                            <input type="radio" name="q${i}" value="${opt}" class="hidden peer" onchange="saveAnswer(${i}, ${opt})">
                            <span class="w-8 h-8 flex items-center justify-center rounded-full border-2 peer-checked:bg-blue-600 peer-checked:text-white peer-checked:border-blue-600">
                                ${opt}
                            </span>
                        </label>
                    `;
                }

                questionDiv.innerHTML = `
                    <div class="flex items-center mb-3">
                        <span class="font-bold text-lg text-blue-700 mr-3">${i}번.</span>
                        <div class="h-px bg-gray-200 flex-grow"></div>
                    </div>
                    <div class="grid grid-cols-4 gap-2">
                        ${optionsHtml}
                    </div>
                `;
                container.appendChild(questionDiv);
            }
        }

        window.saveAnswer = (qNum, val) => {
            answers[qNum] = val;
            updateProgress();
        };

        function updateProgress() {
            const answeredCount = Object.keys(answers).length;
            const progressPercent = (answeredCount / totalQuestions) * 100;
            document.getElementById('progress-bar').style.width = `${progressPercent}%`;
            document.getElementById('progress-text').innerText = `${answeredCount} / ${totalQuestions} 문항 완료`;
        }

        window.submitAnswers = async () => {
            if (Object.keys(answers).length < totalQuestions) {
                if (!confirm("아직 풀지 않은 문항이 있습니다. 정말 제출할까요?")) return;
            }

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerText = "정답 제출 중...";

            const studentData = {
                subject: document.getElementById('subject').value,
                gradeClass: document.getElementById('gradeClass').value,
                studentNum: document.getElementById('studentNum').value,
                studentName: document.getElementById('studentName').value,
                answers: answers
            };

            try {
                // 구글 시트로 데이터 전송
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(studentData)
                });
                
                // 전송 성공 시 화면 전환
                document.getElementById('survey-screen').classList.add('hidden');
                document.getElementById('success-screen').classList.remove('hidden');
                window.scrollTo(0, 0);
            } catch (error) {
                console.error("제출 오류:", error);
                showMessage("전송 중 오류가 발생했습니다. 다시 시도해 주세요.");
                submitBtn.disabled = false;
                submitBtn.innerText = "다시 제출하기";
            }
        };

        function showMessage(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-full shadow-lg z-50 hidden"></div>

    <!-- 1. 로그인 화면 -->
    <div id="login-screen" class="flex-grow flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
            <h1 class="text-2xl font-bold text-center text-gray-800 mb-8">📝 진단평가 정답 제출 </h1>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">과목 선택</label>
                    <select id="subject" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="">과목을 선택하세요</option>
                        <option value="국어">국어</option>
                        <option value="수학">수학</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">반</label>
                        <input type="text" id="gradeClass" placeholder="예: 3반" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">번호</label>
                        <input type="number" id="studentNum" placeholder="예: 15" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">이름</label>
                    <input type="text" id="studentName" placeholder="이름을 입력하세요" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                
                <button onclick="startSurvey()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-lg hover:bg-blue-700 transition-colors shadow-md mt-4">
                    시작하기
                </button>
            </div>
        </div>
    </div>

    <!-- 2. 설문지 화면 -->
    <div id="survey-screen" class="hidden flex-grow flex flex-col max-w-2xl mx-auto w-full p-4">
        <div class="sticky top-0 bg-white/80 backdrop-blur-md p-4 mb-4 rounded-xl shadow-sm border border-gray-100 z-10">
            <div class="flex justify-between items-end mb-2">
                <h2 class="font-bold text-gray-800">정답을 체크하세요</h2>
                <span id="progress-text" class="text-sm text-blue-600 font-medium">0 / 24 문항 완료</span>
            </div>
            <div class="w-full bg-gray-200 h-2 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-blue-600 h-full transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>

        <div id="questions-container" class="space-y-4"></div>

        <button id="submit-btn" onclick="submitAnswers()" class="mt-8 mb-12 w-full bg-green-600 text-white font-bold py-4 rounded-xl hover:bg-green-700 transition-colors shadow-lg">
            최종 제출하기
        </button>
    </div>

    <!-- 3. 완료 화면 -->
    <div id="success-screen" class="hidden flex-grow flex items-center justify-center p-4 text-center">
        <div class="bg-white p-10 rounded-2xl shadow-xl max-w-sm">
            <div class="text-6xl mb-4">✅</div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">제출 성공!</h2>
            <p class="text-gray-600 mb-8">구글 시트에 성공적으로 기록되었습니다.</p>
            <button onclick="location.reload()" class="text-blue-600 font-medium hover:underline">
                처음으로 돌아가기
            </button>
        </div>
    </div>

</body>
</html>
